name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: System deps (OpenMP runtime for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + web)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"     # web=flask,test_web 需要;llm/broker 懒加载不需装

      - name: Run tests + coverage (offline, synthetic data)
        run: pytest -q --cov=quantmill --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff (lint, non-blocking for now)
        run: |
          pip install ruff
          ruff check quantmill || true    # 逐步收敛,暂不阻塞
